name: Refresh WAF token

# Solves the Toyota AWS WAF challenge and caches a reusable token in Redis.
#
# Reliability design — OVERLAPPING long-lived runs:
#   GitHub's scheduled cron has a 5-min minimum and is frequently delayed by
#   30-60+ min under load. The old setup (50-min loop, relaunch every 55 min)
#   left a gap whenever the next run was late: the token's TTL expired before a
#   fresh run started, and the app returned "no WAF token cached".
#
#   Fix: each run loops for ~5.5h (near GitHub's 6h job cap), refreshing every
#   REFRESH_INTERVAL seconds, and we schedule a NEW run every 4h. Because the
#   loop (5.5h) is longer than the schedule interval (4h), consecutive runs
#   OVERLAP by ~90 min. There is intentionally NO concurrency serialization, so
#   the incoming run is already refreshing the token before the outgoing run
#   exits — eliminating the gap even when the scheduler is ~90 min late.
#
# NOTE: free GitHub Actions minutes are unlimited for public repos. At most two
# runs overlap, so this stays well within reason. If this repo is ever made
# private, shorten LOOP_MINUTES / widen the cron to control budget.

on:
  schedule:
    - cron: '0 */4 * * *' # every 4h; the 5.5h loop overlaps the next run
  workflow_dispatch: {} # allow manual runs

# NO concurrency group on purpose — overlapping runs are what closes the gap.

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub's hard job cap is 6h
    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      SEED_VSPEC_URL: ${{ secrets.SEED_VSPEC_URL }}
      REFRESH_INTERVAL: '240' # seconds between refreshes (4 min)
      LOOP_MINUTES: '330' # ~5.5h loop, leaving headroom under the 6h cap
      TOKEN_TTL_SECONDS: '1200' # 20-min Redis expiry — cushions brief gaps
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install solver deps
        working-directory: scripts/waf-solver
        run: npm install

      - name: Install Chromium
        working-directory: scripts/waf-solver
        run: npx playwright install --with-deps chromium

      - name: Solve + refresh loop
        working-directory: scripts/waf-solver
        run: |
          end=$(( $(date +%s) + LOOP_MINUTES * 60 ))
          attempt=0
          while [ "$(date +%s)" -lt "$end" ]; do
            attempt=$((attempt + 1))
            echo "::group::Refresh attempt $attempt"
            if node solve.mjs; then
              echo "refresh ok"
            else
              echo "::warning::refresh attempt $attempt failed"
            fi
            echo "::endgroup::"
            # Stop sleeping if the next interval would run past the loop window.
            [ "$(( $(date +%s) + REFRESH_INTERVAL ))" -ge "$end" ] && break
            sleep "$REFRESH_INTERVAL"
          done
